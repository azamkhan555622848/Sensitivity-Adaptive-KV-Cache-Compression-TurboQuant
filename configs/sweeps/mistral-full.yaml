output_dir: results/mistral-full
models:
  - configs/models/mistral-7b.yaml
methods:
  # Baselines
  - type: fp16
  - type: kivi
    params: {bits: 4, residual_window: 128}
  - type: kivi
    params: {bits: 2, residual_window: 128}
  # TurboQuant-V3 bit-width sweep
  - type: turboquant-v3
    params: {key_bits: 4, value_bits: 4, residual_window: 128}
  - type: turboquant-v3
    params: {key_bits: 4, value_bits: 2, residual_window: 128}
  - type: turboquant-v3
    params: {key_bits: 6, value_bits: 4, residual_window: 128}
  - type: turboquant-v3
    params: {key_bits: 2, value_bits: 2, residual_window: 128}
  # Residual window ablation (K4V4)
  - type: turboquant-v3
    params: {key_bits: 4, value_bits: 4, residual_window: 0}
  - type: turboquant-v3
    params: {key_bits: 4, value_bits: 4, residual_window: 64}
  - type: turboquant-v3
    params: {key_bits: 4, value_bits: 4, residual_window: 256}
  # Adaptive allocation (uniform fallback for now, will calibrate separately)
  - type: turboquant-adaptive
    params: {budget: 4.0, residual_window: 128}
benchmarks:
  - type: perplexity
    params: {datasets: [wikitext2], max_seq_len: 2048}
