output_dir: results/qwen-budget-sweep
models:
  - configs/models/qwen2.5-3b.yaml
methods:
  - type: fp16
  # Uniform baselines
  - type: turboquant-v3
    params: {key_bits: 2, value_bits: 2, residual_window: 128}
  - type: turboquant-v3
    params: {key_bits: 3, value_bits: 3, residual_window: 128}
  - type: turboquant-v3
    params: {key_bits: 4, value_bits: 4, residual_window: 128}
  - type: turboquant-v3
    params: {key_bits: 6, value_bits: 6, residual_window: 128}
  # Adaptive at each budget
  - type: turboquant-adaptive
    params: {budget: 2.0, residual_window: 128, calibration_file: results/calibration/Qwen_Qwen2.5-3B-Instruct_budget2.0_kvsplit.json}
  - type: turboquant-adaptive
    params: {budget: 2.5, residual_window: 128, calibration_file: results/calibration/Qwen_Qwen2.5-3B-Instruct_budget2.5_kvsplit.json}
  - type: turboquant-adaptive
    params: {budget: 3.0, residual_window: 128, calibration_file: results/calibration/Qwen_Qwen2.5-3B-Instruct_budget3.0_kvsplit.json}
  - type: turboquant-adaptive
    params: {budget: 6.0, residual_window: 128, calibration_file: results/calibration/Qwen_Qwen2.5-3B-Instruct_budget6.0_kvsplit.json}
  # Outlier-aware at 4-bit (best single method)
  - type: turboquant-outlier
    params: {key_bits: 4, value_bits: 4, residual_window: 128, outlier_file: results/outlier/Qwen_Qwen2.5-3B-Instruct_outlier_profile.json}
  # Outlier+adaptive at 4-bit
  - type: turboquant-adaptive-outlier
    params: {key_bits: 4, value_bits: 4, residual_window: 128, outlier_file: results/outlier/Qwen_Qwen2.5-3B-Instruct_outlier_profile.json, calibration_file: results/calibration/Qwen_Qwen2.5-3B-Instruct_budget4.0.json}
benchmarks:
  - type: perplexity
    params: {datasets: [wikitext2], max_seq_len: 2048}
